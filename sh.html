:root{
--bg:#0a0a0a;
--card:#121212;
--gold:#ffd700;
--text:#f5f5f5;

body.light{
--bg:#ffffff;
--card:#f2f2f2;
--gold:#d4af37;
--text:#222;
--shadow:0 4px 12px rgba(0,0,0,.12);

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
background:var(--bg);
color:var(--text);

line-height:1.8;
padding:18px;
transition:.4s;

/* Logo */

.logo{
width:300px;
max-width:100%;
height:auto;
border-radius:12px;
border:3px solid var(--gold);
display:block;
margin:0 auto 20px;
animation:float 6s ease-in-out infinite, glowLogo 3s ease-in-out infinite;
}

@keyframes float{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-6px)}
}

@keyframes glowLogo{
0%{box-shadow:0 0 6px var(--gold)}
50%{box-shadow:0 0 20px var(--gold)}
100%{box-shadow:0 0 6px var(--gold)}
}

/* Title */

h1{
text-align:center;
color:var(--gold);
margin-bottom:20px;
font-size:28px;
}

/* Navigation */

.nav-icons{
display:flex;
justify-content:center;
gap:16px;
flex-wrap:wrap;
margin:20px 0 30px;
}

.nav-icons a{
background:var(--card);
padding:10px 20px;
border-radius:999px;
color:var(--gold);
font-weight:700;
text-decoration:none;
display:flex;
align-items:center;
gap:6px;
box-shadow:var(--shadow);
transition:.3s;
}

.nav-icons a:hover{
transform:translateY(-4px);
box-shadow:0 0 10px var(--gold);
}

/* Rules */

.rules{
background:var(--card);
padding:25px 22px;
border-radius:14px;
box-shadow:var(--shadow);
max-width:700px;
margin:auto;
}

.rules h2{
color:var(--gold);
margin-bottom:14px;
font-size:22px;
text-align:center;
}

.rules ul{
list-style:none;
}

.rules li{
margin:10px 0;
font-size:16px;
display:flex;
align-items:flex-start;
gap:8px;
}

.rules li i{
color:var(--gold);
margin-top:4px;
}

/* Footer */

footer{
text-align:center;
margin-top:30px;
font-size:14px;
color:var(--gold);
}

position:fixed;

height:46px;
border:none;
border-radius:50%;

align-items:center;

<script>

/* theme */

const themeBtn = document.getElementById("themeToggle");
const icon = themeBtn.querySelector("i");

// 1. التحقق من التفضيل المحفوظ أو تعيين الوضع الليلي كافتراضي
// لاحظ أننا نفترض أن "الوضع الطبيعي" لملف الـ CSS هو الليلي، 
// وأن كلاس "light" هو الذي يحول المتصفح للنهار.
const currentTheme = localStorage.getItem("theme") || "dark";

if (currentTheme === "light") {
    document.body.classList.add("light");
    icon.classList.replace("fa-moon", "fa-sun");
} else {
    document.body.classList.remove("light");
    icon.classList.replace("fa-sun", "fa-moon");
}

// 2. منطق التبديل عند الضغط
themeBtn.onclick = () => {
    document.body.classList.toggle("light");
    
    let theme = "dark";
    if (document.body.classList.contains("light")) {
        theme = "light";
        icon.classList.replace("fa-moon", "fa-sun");
    } else {
        theme = "dark";
        icon.classList.replace("fa-sun", "fa-moon");
    }
    
    // حفظ الخيار لكي لا يتغير عند تحديث الصفحة
    localStorage.setItem("theme", theme);
};

/* كود الموسيقى يبقى كما هو */
const musicBtn = document.getElementById("musicToggle");
const audio = document.getElementById("bgMusic");

musicBtn.onclick = () => {
    if (audio.paused) {
        audio.muted = false;
        audio.play();
    } else {
        audio.pause();
    }
};
	

</script>
